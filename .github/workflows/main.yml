# ═══════════════════════════════════════════════════════════════════════════
#  KOSPI ORACLE V7 — OMNIPOTENT DEPLOYMENT PIPELINE
#  ─────────────────────────────────────────────────────────────────────────
#  Nasdaq DevOps Guru Edition — Production-Grade CI/CD
#
#  🎯 핵심 설계 철학
#    ▸ Defense in Depth        : 다중 방어선 (검증 → 실행 → 검증 → 배포)
#    ▸ Fail-Safe Defaults      : 모든 단계가 실패해도 사이트는 살아남음
#    ▸ Observable by Design    : 모든 단계가 명확한 출력과 메트릭 생성
#    ▸ Cost-Aware              : 장 시간대만 가동하여 무료 한도 내 운영
#    ▸ Idempotent              : 같은 입력은 같은 결과 (재실행 안전)
#
#  📊 파이프라인 아키텍처
#    [TRIGGER] → [PREFLIGHT] → [BUILD] → [VERIFY] → [DEPLOY] → [POSTMORTEM]
#
#  🔐 보안 모델
#    ▸ Least Privilege         : 최소 필요 권한만 부여
#    ▸ Secret Rotation Ready   : Secrets은 환경변수로만 전파
#    ▸ Audit Trail             : 모든 실행이 GitHub Actions 로그에 영구 기록
# ═══════════════════════════════════════════════════════════════════════════

name: 🔮 KOSPI Oracle V7 — Omnipotent Pipeline

# ─────────────────────────────────────────────────────────────────────────
#  [트리거 정책]
#  ─ schedule  : 한국장/미국장 시간대만 10분 간격 (무료 한도 보호)
#  ─ dispatch  : 관리자 수동 실행 (디버깅/긴급 갱신용)
#  ─ push      : 코드 변경 시 즉시 검증 (수집은 안함)
# ─────────────────────────────────────────────────────────────────────────
on:
  schedule:
    # ━━ 한국장 시간대 (KST 08:30~16:00 = UTC 23:30~07:00) 평일 ━━
    - cron: '*/10 23 * * 0-4'    # 일~목 UTC 23시 (KST 08시)
    - cron: '*/10 0-6 * * 1-5'   # 월~금 UTC 0~6시 (KST 9~15시)
    # ━━ 미국장 시간대 (ET 09:30~16:30 = UTC 13:30~21:00) 평일 ━━
    - cron: '*/10 13-21 * * 1-5' # 월~금 UTC 13~21시
    # ━━ 매일 자정 KST = UTC 15시 → 일일 적중률 검증 잡 트리거 ━━
    - cron: '5 15 * * 1-5'       # 월~금 UTC 15:05 (KST 익일 00:05)

  workflow_dispatch:
    inputs:
      force_run:
        description: '⚡ 휴장일/주말에도 강제 실행'
        required:    false
        type:        boolean
        default:     false
      skip_gemini:
        description: '🤖 Gemini AI 호출 스킵 (디버그용)'
        required:    false
        type:        boolean
        default:     false
      verbose:
        description: '🔍 상세 로그 출력'
        required:    false
        type:        boolean
        default:     false

  push:
    branches: [main]
    paths:
      - 'data_collector.py'
      - '.github/workflows/**'
      - 'requirements.txt'

# ─────────────────────────────────────────────────────────────────────────
#  [동시성 제어]
#  같은 그룹 내 새 실행이 시작되면 진행 중인 실행 즉시 취소
#  → 중복 커밋/푸시 충돌 100% 방지
# ─────────────────────────────────────────────────────────────────────────
concurrency:
  group:              "oracle-v7-${{ github.ref }}"
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────
#  [전역 권한 모델]
#  Repository에 commit & push할 수 있는 최소 권한만 부여
# ─────────────────────────────────────────────────────────────────────────
permissions:
  contents: write    # data.json, history.json, prediction_log.json 커밋용
  actions:  read     # 워크플로우 메트릭 조회용

# ─────────────────────────────────────────────────────────────────────────
#  [전역 환경 변수]
#  모든 잡에서 공유되는 상수
# ─────────────────────────────────────────────────────────────────────────
env:
  PYTHON_VERSION:       '3.10'
  PIP_CACHE_DIR:        ~/.cache/pip
  YF_CACHE_DIR:         ~/.cache/yfinance
  TZ:                   'Asia/Seoul'
  PIPELINE_VERSION:     'V7.OMNIPOTENT'
  PYTHONUNBUFFERED:     '1'              # 실시간 로그 출력
  PYTHONDONTWRITEBYTECODE: '1'           # .pyc 파일 안 만듦


# ═══════════════════════════════════════════════════════════════════════════
#  JOBS
# ═══════════════════════════════════════════════════════════════════════════
jobs:

  # ┌────────────────────────────────────────────────────────────────────┐
  # │  JOB 1: PREFLIGHT CHECK                                             │
  # │  ▸ 실행 가능 여부 사전 검증                                          │
  # │  ▸ 휴장일/주말 → 다음 잡 스킵                                        │
  # │  ▸ 환경 변수 누락 → 즉시 실패                                        │
  # │  ▸ 약 5초 소요                                                      │
  # └────────────────────────────────────────────────────────────────────┘
  preflight:
    name:           "🛫 1. Preflight Check"
    runs-on:        ubuntu-latest
    timeout-minutes: 2

    outputs:
      should_run:        ${{ steps.gate.outputs.should_run }}
      is_market_hours:   ${{ steps.gate.outputs.is_market_hours }}
      is_postmortem:     ${{ steps.gate.outputs.is_postmortem }}
      kst_time:          ${{ steps.gate.outputs.kst_time }}
      kst_weekday:       ${{ steps.gate.outputs.kst_weekday }}

    steps:
      # ─── 1.1 코드 체크아웃 (얕은 복제로 속도 최적화) ───
      - name: 📥 1.1 Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ─── 1.2 KST 시간 계산 및 휴장일 게이트 ───
      - name: 🚦 1.2 Market Hours & Holiday Gate
        id: gate
        run: |
          set -euo pipefail

          # ━━ KST 시간 정보 추출 ━━
          KST_TIME=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M:%S')
          KST_HOUR=$(TZ=Asia/Seoul date +'%H' | sed 's/^0*//')
          KST_HOUR=${KST_HOUR:-0}
          KST_WEEKDAY=$(TZ=Asia/Seoul date +'%u')   # 1=월 ~ 7=일
          KST_DATE=$(TZ=Asia/Seoul date +'%Y-%m-%d')

          echo "═══════════════════════════════════════════════════════"
          echo "  🕐 KST 시각:  $KST_TIME"
          echo "  📅 요일코드: $KST_WEEKDAY (1=월, 7=일)"
          echo "═══════════════════════════════════════════════════════"

          # ━━ 한국 공휴일 캘린더 (2025-2026) ━━
          # 양력 고정 휴일은 사전 등록, 음력 휴일은 매년 추가 필요
          HOLIDAYS=(
            # 2025
            "2025-01-01" "2025-01-28" "2025-01-29" "2025-01-30"
            "2025-03-01" "2025-03-03" "2025-05-05" "2025-05-06"
            "2025-06-06" "2025-08-15" "2025-10-03" "2025-10-06"
            "2025-10-07" "2025-10-08" "2025-10-09" "2025-12-25"
            # 2026
            "2026-01-01" "2026-02-16" "2026-02-17" "2026-02-18"
            "2026-03-01" "2026-03-02" "2026-05-05" "2026-05-25"
            "2026-06-06" "2026-08-15" "2026-08-17" "2026-09-24"
            "2026-09-25" "2026-09-26" "2026-10-03" "2026-10-05"
            "2026-10-09" "2026-12-25"
          )

          IS_HOLIDAY=false
          for h in "${HOLIDAYS[@]}"; do
            if [[ "$KST_DATE" == "$h" ]]; then
              IS_HOLIDAY=true
              break
            fi
          done

          # ━━ 강제 실행 모드 ━━
          FORCE="${{ github.event.inputs.force_run }}"
          if [[ "$FORCE" == "true" ]]; then
            echo "⚡ 강제 실행 모드 활성화 → 모든 게이트 우회"
            echo "should_run=true"        >> $GITHUB_OUTPUT
            echo "is_market_hours=true"   >> $GITHUB_OUTPUT
            echo "is_postmortem=false"    >> $GITHUB_OUTPUT
            echo "kst_time=$KST_TIME"     >> $GITHUB_OUTPUT
            echo "kst_weekday=$KST_WEEKDAY" >> $GITHUB_OUTPUT
            exit 0
          fi

          # ━━ Push 이벤트는 항상 실행 (CI 검증) ━━
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "🔧 Push 트리거 → CI 검증 모드"
            echo "should_run=true"        >> $GITHUB_OUTPUT
            echo "is_market_hours=false"  >> $GITHUB_OUTPUT
            echo "is_postmortem=false"    >> $GITHUB_OUTPUT
            echo "kst_time=$KST_TIME"     >> $GITHUB_OUTPUT
            echo "kst_weekday=$KST_WEEKDAY" >> $GITHUB_OUTPUT
            exit 0
          fi

          # ━━ 일일 적중률 검증 잡 (KST 자정 무렵) ━━
          # UTC 15:05 = KST 00:05
          UTC_HOUR=$(date -u +'%H' | sed 's/^0*//')
          UTC_MIN=$(date -u +'%M' | sed 's/^0*//')
          UTC_HOUR=${UTC_HOUR:-0}
          UTC_MIN=${UTC_MIN:-0}

          if [[ "$UTC_HOUR" == "15" ]] && [[ "$UTC_MIN" -lt 15 ]]; then
            echo "🎯 일일 적중률 검증 모드"
            echo "should_run=true"        >> $GITHUB_OUTPUT
            echo "is_market_hours=false"  >> $GITHUB_OUTPUT
            echo "is_postmortem=true"     >> $GITHUB_OUTPUT
            echo "kst_time=$KST_TIME"     >> $GITHUB_OUTPUT
            echo "kst_weekday=$KST_WEEKDAY" >> $GITHUB_OUTPUT
            exit 0
          fi

          # ━━ 주말 체크 (토=6, 일=7) ━━
          if [[ "$KST_WEEKDAY" -ge 6 ]]; then
            # 미국장은 한국시간 토요일 새벽까지 열림 (금요일 미국 정규장)
            # UTC 금요일 ~ 토요일 21시까지는 미국장 영향권
            if [[ "$KST_WEEKDAY" == "6" ]] && [[ "$KST_HOUR" -lt 7 ]]; then
              echo "🇺🇸 미국장 마감 직후 (한국 토요일 새벽) → 실행"
            else
              echo "🏖️ 주말 → 실행 스킵"
              echo "should_run=false"      >> $GITHUB_OUTPUT
              echo "is_market_hours=false" >> $GITHUB_OUTPUT
              echo "is_postmortem=false"   >> $GITHUB_OUTPUT
              echo "kst_time=$KST_TIME"    >> $GITHUB_OUTPUT
              echo "kst_weekday=$KST_WEEKDAY" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # ━━ 공휴일 체크 ━━
          if [[ "$IS_HOLIDAY" == "true" ]] && [[ "$KST_HOUR" -lt 22 ]]; then
            echo "🎌 공휴일 ($KST_DATE) → 한국장 휴장. 미국장 시간만 실행"
            # 미국장 시간(KST 22시~익일 6시)이 아니면 스킵
            if [[ "$KST_HOUR" -lt 22 ]] && [[ "$KST_HOUR" -gt 6 ]]; then
              echo "should_run=false"      >> $GITHUB_OUTPUT
              echo "is_market_hours=false" >> $GITHUB_OUTPUT
              echo "is_postmortem=false"   >> $GITHUB_OUTPUT
              echo "kst_time=$KST_TIME"    >> $GITHUB_OUTPUT
              echo "kst_weekday=$KST_WEEKDAY" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # ━━ 정상 실행 ━━
          echo "✅ 정상 실행 조건 충족"
          echo "should_run=true"           >> $GITHUB_OUTPUT
          echo "is_market_hours=true"      >> $GITHUB_OUTPUT
          echo "is_postmortem=false"       >> $GITHUB_OUTPUT
          echo "kst_time=$KST_TIME"        >> $GITHUB_OUTPUT
          echo "kst_weekday=$KST_WEEKDAY"  >> $GITHUB_OUTPUT

      # ─── 1.3 Secrets 존재 검증 ───
      - name: 🔐 1.3 Validate Required Secrets
        if: steps.gate.outputs.should_run == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          echo "🔐 Secrets 검증 중..."

          # GitHub Token은 자동 제공이므로 별도 체크 불필요

          # Gemini API Key는 선택사항 (없으면 폴백 모드)
          if [[ -z "${GEMINI_API_KEY}" ]]; then
            echo "⚠️  GEMINI_API_KEY 미설정 → 규칙 기반 폴백 모드로 운영됩니다."
          else
            # API 키 형식 검증 (Google API Key는 일반적으로 AIza로 시작)
            if [[ ! "${GEMINI_API_KEY}" =~ ^AIza ]]; then
              echo "❌ GEMINI_API_KEY 형식이 의심스럽습니다 (AIza로 시작해야 함)"
              echo "::warning::GEMINI_API_KEY format may be invalid"
            else
              KEY_LEN=${#GEMINI_API_KEY}
              echo "✅ GEMINI_API_KEY 설정됨 (길이: $KEY_LEN자)"
            fi
          fi

      # ─── 1.4 데이터 파일 무결성 사전 검증 ───
      - name: 🩺 1.4 Data Integrity Pre-Check
        if: steps.gate.outputs.should_run == 'true'
        run: |
          set -euo pipefail

          # data.json이 존재하면 파싱 가능한지 확인
          if [[ -f "data.json" ]]; then
            if python3 -c "import json; json.load(open('data.json'))" 2>/dev/null; then
              SIZE=$(stat -c%s data.json 2>/dev/null || stat -f%z data.json)
              echo "✅ 기존 data.json 무결성 검증 통과 ($SIZE bytes)"
            else
              echo "⚠️  기존 data.json 손상 감지 → 백업 후 새로 빌드"
              mv data.json data.json.corrupted.$(date +%s)
            fi
          else
            echo "📄 data.json 없음 → 첫 빌드 모드"
          fi

      # ─── 1.5 잡 요약 리포트 ───
      - name: 📊 1.5 Preflight Summary
        if: always()
        run: |
          echo "═══════════════════════════════════════════════════════"
          echo "  🛫 PREFLIGHT CHECK 결과"
          echo "═══════════════════════════════════════════════════════"
          echo "  실행 여부:     ${{ steps.gate.outputs.should_run }}"
          echo "  장 시간:       ${{ steps.gate.outputs.is_market_hours }}"
          echo "  검증 모드:     ${{ steps.gate.outputs.is_postmortem }}"
          echo "  KST 시각:      ${{ steps.gate.outputs.kst_time }}"
          echo "  요일 코드:     ${{ steps.gate.outputs.kst_weekday }}"
          echo "  트리거:        ${{ github.event_name }}"
          echo "═══════════════════════════════════════════════════════"


  # ┌────────────────────────────────────────────────────────────────────┐
  # │  JOB 2: BUILD & SYNC                                                │
  # │  ▸ Python 환경 구축 + 캐싱                                            │
  # │  ▸ data_collector.py 실행                                            │
  # │  ▸ data.json, history.json, prediction_log.json 생성                 │
  # │  ▸ 약 90~180초 소요                                                  │
  # └────────────────────────────────────────────────────────────────────┘
  build:
    name:           "🧠 2. Build & Sync"
    needs:          preflight
    if:             needs.preflight.outputs.should_run == 'true' && needs.preflight.outputs.is_postmortem != 'true'
    runs-on:        ubuntu-latest
    timeout-minutes: 12

    outputs:
      data_changed:    ${{ steps.diff.outputs.data_changed }}
      oracle_score:    ${{ steps.extract.outputs.oracle_score }}
      market_temp:     ${{ steps.extract.outputs.market_temp }}
      ai_enhanced:     ${{ steps.extract.outputs.ai_enhanced }}
      asset_count:     ${{ steps.extract.outputs.asset_count }}
      build_elapsed:   ${{ steps.timer.outputs.elapsed }}

    steps:
      # ─── 2.1 전체 코드 체크아웃 ───
      - name: 📥 2.1 Full Repository Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 안전한 rebase merge용 전체 히스토리
          token:       ${{ secrets.GITHUB_TOKEN }}

      # ─── 2.2 빌드 타이머 시작 ───
      - name: ⏱️ 2.2 Start Build Timer
        id: timer_start
        run: echo "start_ts=$(date +%s)" >> $GITHUB_OUTPUT

      # ─── 2.3 Python 환경 구축 ───
      - name: 🐍 2.3 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache:          'pip'

      # ─── 2.4 yfinance 캐시 복원 (5배 속도 향상) ───
      - name: 💾 2.4 Restore yfinance Cache
        id: yf_cache
        uses: actions/cache@v4
        with:
          path: ${{ env.YF_CACHE_DIR }}
          # 캐시 키: 매일 새로 생성 (KST 기준)
          key:          yf-cache-${{ runner.os }}-${{ hashFiles('data_collector.py') }}-${{ github.run_id }}
          restore-keys: |
            yf-cache-${{ runner.os }}-${{ hashFiles('data_collector.py') }}-
            yf-cache-${{ runner.os }}-

      # ─── 2.5 requirements.txt 생성 (없으면) ───
      - name: 📋 2.5 Ensure requirements.txt
        run: |
          set -euo pipefail
          if [[ ! -f "requirements.txt" ]]; then
            echo "📝 requirements.txt 생성 중..."
            cat > requirements.txt << 'EOF'
          # KOSPI Oracle V7 — Python Dependencies
          yfinance>=0.2.40,<0.3.0
          pandas>=2.0.0,<3.0.0
          numpy>=1.24.0,<2.0.0
          pytz>=2024.1
          requests>=2.31.0,<3.0.0
          EOF
            echo "✅ requirements.txt 생성 완료"
          else
            echo "✅ 기존 requirements.txt 사용"
          fi
          cat requirements.txt

      # ─── 2.6 의존성 설치 ───
      - name: 📦 2.6 Install Dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          echo "─── 설치된 핵심 패키지 버전 ───"
          pip show yfinance pandas numpy pytz requests | grep -E "^(Name|Version)"

      # ─── 2.7 코드 정적 분석 (Syntax Check) ───
      - name: 🔍 2.7 Static Code Analysis
        run: |
          set -euo pipefail
          echo "📋 Python 문법 검증..."
          python -m py_compile data_collector.py
          echo "✅ 문법 검증 통과"

          echo "📋 코드 통계..."
          LINES=$(wc -l < data_collector.py)
          CLASSES=$(grep -c "^class " data_collector.py || echo 0)
          FUNCS=$(grep -cE "^(def |    def )" data_collector.py || echo 0)
          echo "  ▸ 총 라인 수: $LINES"
          echo "  ▸ 클래스 수:  $CLASSES"
          echo "  ▸ 함수 수:    $FUNCS"

      # ─── 2.8 메인 엔진 실행 ───
      - name: 🚀 2.8 Execute Oracle Engine
        id: engine
        env:
          GEMINI_API_KEY: ${{ github.event.inputs.skip_gemini == 'true' && '' || secrets.GEMINI_API_KEY }}
          VERBOSE:        ${{ github.event.inputs.verbose }}
        run: |
          set -euo pipefail

          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║         🚀 ORACLE ENGINE V7 IGNITION                     ║"
          echo "║         Trigger: ${{ github.event_name }}                     ║"
          echo "║         KST: ${{ needs.preflight.outputs.kst_time }}      ║"
          echo "╚══════════════════════════════════════════════════════════╝"

          # 실행 시간 측정
          ENGINE_START=$(date +%s)

          # 엔진 실행 (출력 실시간 스트리밍)
          python data_collector.py 2>&1 | tee engine_output.log

          ENGINE_END=$(date +%s)
          ENGINE_ELAPSED=$((ENGINE_END - ENGINE_START))
          echo "engine_elapsed=$ENGINE_ELAPSED" >> $GITHUB_OUTPUT

          echo ""
          echo "⏱️ 엔진 실행 시간: ${ENGINE_ELAPSED}초"

      # ─── 2.9 결과 메트릭 추출 ───
      - name: 📊 2.9 Extract Build Metrics
        id: extract
        run: |
          set -euo pipefail

          if [[ ! -f "data.json" ]]; then
            echo "❌ data.json이 생성되지 않았습니다!"
            exit 1
          fi

          # JSON에서 핵심 메트릭 추출
          python3 << 'PYEOF' >> $GITHUB_OUTPUT
          import json
          try:
              with open('data.json', 'r', encoding='utf-8') as f:
                  d = json.load(f)
              print(f"oracle_score={d.get('prediction', {}).get('score', 'N/A')}")
              print(f"market_temp={d.get('market_temp', 'N/A')}")
              print(f"ai_enhanced={'true' if d.get('prediction', {}).get('ai_enhanced') else 'false'}")
              print(f"asset_count={d.get('stats', {}).get('success', 0)}")
              print(f"failed_count={d.get('stats', {}).get('failed', 0)}")
          except Exception as e:
              print(f"oracle_score=ERROR")
              print(f"market_temp=ERROR")
              print(f"ai_enhanced=false")
              print(f"asset_count=0")
              print(f"failed_count=0")
          PYEOF

      # ─── 2.10 데이터 품질 검증 게이트 ───
      - name: ✅ 2.10 Data Quality Gate
        run: |
          set -euo pipefail

          echo "🔍 데이터 품질 검증 중..."

          python3 << 'PYEOF'
          import json
          import sys

          with open('data.json', 'r', encoding='utf-8') as f:
              d = json.load(f)

          errors = []
          warnings = []

          # 1) 필수 필드 존재 확인
          required = ['version', 'kst', 'market_temp', 'prediction', 'data']
          for k in required:
              if k not in d:
                  errors.append(f"필수 필드 누락: {k}")

          # 2) 자산 수 검증
          assets = d.get('data', [])
          if len(assets) < 10:
              errors.append(f"자산 수 부족: {len(assets)}개 (최소 10개 필요)")
          elif len(assets) < 15:
              warnings.append(f"자산 수 적음: {len(assets)}개")

          # 3) 비정상 가격 변동 탐지
          for a in assets:
              chg = a.get('change', 0)
              if abs(chg) > 25:
                  warnings.append(f"비정상 변동: {a['name']} {chg}%")

          # 4) 오라클 스코어 범위 검증
          score = d.get('prediction', {}).get('score', -1)
          if not (0 <= score <= 100):
              errors.append(f"오라클 스코어 범위 오류: {score}")

          # 5) 시장 온도 범위 검증
          temp = d.get('market_temp', -1)
          if not (0 <= temp <= 100):
              errors.append(f"시장 온도 범위 오류: {temp}")

          # 결과 출력
          print(f"✅ 자산 수: {len(assets)}")
          print(f"✅ 오라클 스코어: {score}")
          print(f"✅ 시장 온도: {temp}°C")

          if warnings:
              print("\n⚠️ 경고:")
              for w in warnings:
                  print(f"   - {w}")

          if errors:
              print("\n❌ 오류:")
              for e in errors:
                  print(f"   - {e}")
              sys.exit(1)

          print("\n🎯 데이터 품질 검증 통과")
          PYEOF

      # ─── 2.11 변경 사항 감지 ───
      - name: 🔄 2.11 Detect Changes
        id: diff
        run: |
          set -euo pipefail

          # git status로 변경 파일 확인
          CHANGED_FILES=$(git status --porcelain | wc -l)

          if [[ "$CHANGED_FILES" -eq 0 ]]; then
            echo "📊 변경 사항 없음"
            echo "data_changed=false" >> $GITHUB_OUTPUT
          else
            echo "📊 변경 파일 $CHANGED_FILES개"
            git status --short
            echo "data_changed=true" >> $GITHUB_OUTPUT
          fi

      # ─── 2.12 빌드 타이머 종료 ───
      - name: ⏱️ 2.12 Build Elapsed Time
        id: timer
        run: |
          END_TS=$(date +%s)
          ELAPSED=$((END_TS - ${{ steps.timer_start.outputs.start_ts }}))
          echo "elapsed=$ELAPSED" >> $GITHUB_OUTPUT
          echo "⏱️ 총 빌드 시간: ${ELAPSED}초"

      # ─── 2.13 로그 아티팩트 업로드 (디버깅용) ───
      - name: 📤 2.13 Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name:          build-logs-${{ github.run_number }}
          path: |
            engine_output.log
            data.json
            history.json
          retention-days: 7
          if-no-files-found: warn

      # ─── 2.14 변경된 파일 커밋 & 푸시 ───
      - name: 🚀 2.14 Smart Commit & Push
        if: steps.diff.outputs.data_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # ─ Git 사용자 설정 ─
          git config --global user.name  "Oracle-V7-Bot"
          git config --global user.email "oracle-bot@kospi-oracle.local"

          # ─ 데이터 파일들 스테이징 ─
          git add data.json history.json prediction_log.json 2>/dev/null || true

          # 실제 스테이징된 변경사항 재확인
          if git diff --cached --quiet; then
            echo "📊 스테이징 결과 변경사항 없음 (스킵)"
            exit 0
          fi

          # ─ 커밋 메시지 작성 ─
          SCORE="${{ steps.extract.outputs.oracle_score }}"
          TEMP="${{ steps.extract.outputs.market_temp }}"
          AI="${{ steps.extract.outputs.ai_enhanced }}"
          ASSETS="${{ steps.extract.outputs.asset_count }}"
          KST="${{ needs.preflight.outputs.kst_time }}"

          AI_TAG="🤖" && [[ "$AI" == "true" ]] || AI_TAG="📐"

          COMMIT_MSG="🔮 Oracle Sync ${AI_TAG} | Score:${SCORE} Temp:${TEMP}°C Assets:${ASSETS}

          KST: ${KST}
          AI Enhanced: ${AI}
          Build Elapsed: ${{ steps.timer.outputs.elapsed }}s
          Trigger: ${{ github.event_name }}"

          git commit -m "$COMMIT_MSG"

          # ─ 충돌 방지: rebase pull 후 push ─
          MAX_RETRY=3
          for i in $(seq 1 $MAX_RETRY); do
            echo "🔄 Push 시도 $i/$MAX_RETRY..."
            git pull --rebase origin main || true

            if git push origin main; then
              echo "🎉 Push 성공!"
              break
            else
              if [[ $i -eq $MAX_RETRY ]]; then
                echo "❌ Push 최종 실패"
                exit 1
              fi
              echo "⚠️ Push 실패. 5초 대기 후 재시도..."
              sleep 5
            fi
          done

      # ─── 2.15 GitHub Step Summary ───
      - name: 📋 2.15 Generate Build Summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # 🔮 KOSPI Oracle V7 — Build Report

          ## 📊 핵심 메트릭

          | 항목 | 값 |
          |------|-----|
          | ⏱️ KST 시각 | \`${{ needs.preflight.outputs.kst_time }}\` |
          | 📊 오라클 스코어 | **${{ steps.extract.outputs.oracle_score }}** / 100 |
          | 🌡️ 시장 온도 | **${{ steps.extract.outputs.market_temp }}°C** |
          | 🤖 AI 강화 | ${{ steps.extract.outputs.ai_enhanced == 'true' && '✅ Gemini 활성' || '📐 규칙 기반' }} |
          | 💎 수집 자산 | ${{ steps.extract.outputs.asset_count }}개 |
          | ⏱️ 빌드 시간 | ${{ steps.timer.outputs.elapsed }}초 |
          | 📝 변경 사항 | ${{ steps.diff.outputs.data_changed == 'true' && '✅ 커밋됨' || '⏸️ 변경 없음' }} |

          ## 🎯 트리거 정보

          - **이벤트**: \`${{ github.event_name }}\`
          - **브랜치**: \`${{ github.ref_name }}\`
          - **실행 번호**: \`${{ github.run_number }}\`
          - **커밋**: \`${{ github.sha }}\`

          ## 🔗 다음 단계

          - [📊 사이트 보기](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }})
          - [📜 모든 워크플로우](${{ github.server_url }}/${{ github.repository }}/actions)
          EOF


  # ┌────────────────────────────────────────────────────────────────────┐
  # │  JOB 3: POSTMORTEM (예측 적중률 검증)                                 │
  # │  ▸ 매일 KST 자정 무렵 실행                                            │
  # │  ▸ 어제 예측한 KOSPI 방향과 실제 결과 비교                              │
  # │  ▸ prediction_log.json에 적중 결과 기록                              │
  # └────────────────────────────────────────────────────────────────────┘
  postmortem:
    name:           "🎯 3. Postmortem Analysis"
    needs:          preflight
    if:             needs.preflight.outputs.is_postmortem == 'true'
    runs-on:        ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 3.1 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token:       ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 3.2 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache:          'pip'

      - name: 📦 3.3 Install Minimal Dependencies
        run: |
          pip install yfinance pytz

      - name: 🎯 3.4 Verify Yesterday's Prediction
        run: |
          python3 << 'PYEOF'
          import json
          import yfinance as yf
          import pytz
          from datetime import datetime, timedelta
          from pathlib import Path

          KST = pytz.timezone('Asia/Seoul')
          LOG_FILE = Path("prediction_log.json")

          if not LOG_FILE.exists():
              print("📝 prediction_log.json 없음 → 검증 스킵")
              exit(0)

          with open(LOG_FILE, 'r', encoding='utf-8') as f:
              logs = json.load(f)

          if not logs:
              print("📝 예측 로그 비어있음 → 스킵")
              exit(0)

          # 마지막 미검증 로그 찾기 (actual_kospi_close_pct가 None)
          target = None
          for entry in reversed(logs):
              if entry.get('actual_kospi_close_pct') is None:
                  target = entry
                  break

          if not target:
              print("✅ 모든 로그 검증 완료. 추가 작업 없음.")
              exit(0)

          target_date = target['date']
          print(f"🎯 {target_date} 예측 검증 시작...")

          # KOSPI 실제 데이터 조회
          try:
              kospi = yf.Ticker("^KS11")
              hist = kospi.history(period="5d")

              if hist.empty:
                  print("⚠️ KOSPI 데이터 조회 실패")
                  exit(0)

              # 해당 날짜 종가 찾기
              hist.index = hist.index.tz_convert(KST).strftime('%Y-%m-%d')
              if target_date not in hist.index:
                  print(f"⏳ {target_date}는 아직 KOSPI 마감 데이터가 없음")
                  exit(0)

              row = hist.loc[target_date]
              if isinstance(row, type(hist)):
                  row = row.iloc[-1]

              # 변동률 계산
              prev_idx = list(hist.index).index(target_date) - 1
              if prev_idx >= 0:
                  prev_close = hist.iloc[prev_idx]['Close']
                  cur_close  = row['Close']
                  actual_pct = round(((cur_close - prev_close) / prev_close) * 100, 2)

                  # 예측 적중 판정
                  pred_score = target['score']
                  pred_dir   = "UP" if pred_score >= 55 else "DOWN" if pred_score <= 45 else "NEUTRAL"
                  actual_dir = "UP" if actual_pct > 0.2 else "DOWN" if actual_pct < -0.2 else "NEUTRAL"

                  is_correct = (pred_dir == actual_dir)

                  target['actual_kospi_close_pct'] = actual_pct
                  target['predicted_direction']   = pred_dir
                  target['actual_direction']      = actual_dir
                  target['is_correct']            = is_correct
                  target['verified_at']           = datetime.now(KST).isoformat()

                  # 저장
                  with open(LOG_FILE, 'w', encoding='utf-8') as f:
                      json.dump(logs, f, ensure_ascii=False, indent=2)

                  # 통계 출력
                  verified = [l for l in logs if l.get('is_correct') is not None]
                  correct  = [l for l in verified if l['is_correct']]
                  accuracy = round(len(correct) / len(verified) * 100, 1) if verified else 0

                  print(f"━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")
                  print(f"  📅 검증 날짜:     {target_date}")
                  print(f"  📊 예측 스코어:   {pred_score} → {pred_dir}")
                  print(f"  💹 실제 변동률:   {actual_pct:+.2f}% → {actual_dir}")
                  print(f"  🎯 적중 여부:     {'✅ 적중' if is_correct else '❌ 미스'}")
                  print(f"━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")
                  print(f"  📈 누적 적중률:   {accuracy}% ({len(correct)}/{len(verified)})")
                  print(f"━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")

          except Exception as e:
              print(f"❌ 검증 중 오류: {e}")
          PYEOF

      - name: 🚀 3.5 Commit Verification Results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name  "Oracle-V7-Bot"
          git config --global user.email "oracle-bot@kospi-oracle.local"

          if git diff --quiet prediction_log.json 2>/dev/null; then
            echo "📊 검증 결과 변경 없음"
            exit 0
          fi

          git add prediction_log.json
          git commit -m "🎯 Daily Postmortem: 예측 적중률 검증 $(TZ=Asia/Seoul date +'%Y-%m-%d')"
          git pull --rebase origin main || true
          git push origin main
          echo "🎉 적중률 데이터 업데이트 완료"


  # ┌────────────────────────────────────────────────────────────────────┐
  # │  JOB 4: NOTIFICATION (실패 시 알림)                                   │
  # │  ▸ 빌드 실패 시 GitHub Issue 자동 생성                                 │
  # │  ▸ 동일 오류 24시간 내 중복 방지                                       │
  # └────────────────────────────────────────────────────────────────────┘
  notify-failure:
    name:    "🚨 4. Failure Notification"
    needs:   [preflight, build]
    if:      always() && (needs.build.result == 'failure' || needs.preflight.result == 'failure')
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: 🚨 4.1 Create or Update Issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Oracle Pipeline Failure - Run #${context.runNumber}`;
            const body  = `
            ## 파이프라인 실행 실패

            - **실행 번호**: #${context.runNumber}
            - **시각 (UTC)**: ${new Date().toISOString()}
            - **트리거**: ${context.eventName}
            - **커밋**: ${context.sha.substring(0, 7)}

            ### 실패한 잡
            - Preflight: \`${{ needs.preflight.result }}\`
            - Build:     \`${{ needs.build.result }}\`

            ### 다음 단계
            1. [실행 로그 확인](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            2. \`data_collector.py\` 또는 \`main.yml\` 점검
            3. 수정 후 \`workflow_dispatch\`로 수동 재실행

            ---
            *자동 생성된 이슈입니다*
            `;

            // 동일 제목의 열린 이슈가 있으면 코멘트만 추가
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'pipeline-failure',
              per_page: 5,
            });

            const existing = issues.data.find(i => i.title.startsWith('🚨 Oracle Pipeline Failure'));

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: existing.number,
                body: `🔁 새 실패 발생 (Run #${context.runNumber}): ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
              console.log(`기존 이슈 #${existing.number}에 코멘트 추가됨`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                title,
                body,
                labels: ['pipeline-failure', 'auto-generated'],
              });
              console.log('새 이슈 생성됨');
            }


  # ┌────────────────────────────────────────────────────────────────────┐
  # │  JOB 5: HEALTH CHECK (성공 시 메트릭 기록)                            │
  # └────────────────────────────────────────────────────────────────────┘
  health-check:
    name:    "💚 5. Health Check"
    needs:   build
    if:      always() && needs.build.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: 💚 5.1 Pipeline Health Report
        run: |
          echo "═══════════════════════════════════════════════════════"
          echo "  💚 PIPELINE HEALTH REPORT"
          echo "═══════════════════════════════════════════════════════"
          echo "  ✅ Status:        HEALTHY"
          echo "  📊 Oracle Score:  ${{ needs.build.outputs.oracle_score }}"
          echo "  🌡️  Market Temp:   ${{ needs.build.outputs.market_temp }}°C"
          echo "  🤖 AI Enhanced:   ${{ needs.build.outputs.ai_enhanced }}"
          echo "  💎 Assets:        ${{ needs.build.outputs.asset_count }}"
          echo "  ⏱️  Elapsed:       ${{ needs.build.outputs.build_elapsed }}s"
          echo "  🔢 Run Number:    #${{ github.run_number }}"
          echo "═══════════════════════════════════════════════════════"
