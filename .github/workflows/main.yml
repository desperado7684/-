name: ORACLE MASTER ENGINE

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  execute-quant-modeling:
    runs-on: ubuntu-latest
    steps:
      - name: System Checkout
        uses: actions/checkout@v4

      - name: Python Environment Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Quant Dependencies
        run: |
          pip install yfinance pandas numpy pytz

      - name: Run Deep Quant Data Collector
        run: python data_collector.py

      - name: Deploy to KOSPI ORACLE
        run: |
          git config --global user.name "Oracle-Master"
          git config --global user.email "master@kospi-oracle.com"
          git add data.json
          git commit -m "Engine Update: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || echo "No Changes Detected"
          git push
