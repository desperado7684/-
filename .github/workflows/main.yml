name: 🚀 KOSPI ORACLE OMNIPOTENT PIPELINE

# 동시 실행 제어: 수동 실행과 자동 실행이 겹칠 때 발생할 수 있는 충돌을 방지합니다.
concurrency:
  group: "oracle-v6-master"
  cancel-in-progress: true

on:
  schedule:
    - cron: '*/10 * * * *' # 10분마다 자동으로 데이터 갱신
  workflow_dispatch:       # 관리자(선생님)가 수동으로 실행 가능하게 설정

permissions:
  contents: write # 레포지토리에 data.json을 저장할 수 있는 필수 권한

jobs:
  quant-sync-engine:
    name: ⚡ Deep Quant Data Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 10 # 시스템이 무한 대기에 빠지는 것을 방지

    steps:
      # 단계 1: 최신 코드 및 데이터 불러오기
      - name: 📥 1. Repository Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 안전한 병합(Merge)을 위해 전체 히스토리 로드

      # 단계 2: 파이썬 환경 구축 (가장 안정적인 3.10 버전)
      - name: 🐍 2. Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 단계 3: 필수 패키지 설치
      - name: 📦 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy pytz
          echo "✅ 모든 분석 라이브러리 설치 완료"

      # 단계 4: 마스터 퀀트 엔진 가동
      - name: 🧠 4. Execute GOD-LEVEL Quant Engine
        run: |
          echo "==================================================="
          echo "🚀 엔진 기동: 데이터를 분석하고 리포트를 작성합니다."
          echo "==================================================="
          python data_collector.py
          echo "✅ 분석 및 모델링 결과 도출 완료"

      # 단계 5: 변경 사항이 있을 때만 안전하게 저장 (Smart Push)
      - name: 🚀 5. Smart Commit & Deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 봇 계정 설정
          git config --global user.name "God-Oracle-Bot"
          git config --global user.email "bot@kospi-oracle.local"
          
          git add data.json
          
          # 데이터 변화가 없을 때(휴장 등)는 불필요한 저장을 하지 않음
          if git diff-index --quiet HEAD; then
            echo "📊 데이터에 변화가 없습니다. 배포를 생략합니다."
          else
            echo "🔄 새로운 데이터 발견. 터미널 동기화를 시작합니다."
            git commit -m "Oracle Master Sync 📡: $(date +'%Y-%m-%d %H:%M:%S')"
            
            # 충돌 방지: 최신 상태를 먼저 가져온 후 합치는 Rebase 전략 적용
            git pull --rebase origin main
            git push origin main
            echo "🎉 성공적으로 KOSPI ORACLE이 업데이트되었습니다!"
          fi

      # 단계 6: 실패 시 로그 출력 (Fail-Safe)
      - name: 🚨 6. Emergency Fail Notification
        if: failure()
        run: |
          echo "❌ 파이프라인 가동 중 오류가 발생했습니다. 로그를 확인하세요."
